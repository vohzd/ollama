# ollama - shared estate LLM service (salem, *.salem.internal).
#
# One instance for every app: consumers set OLLAMA_BASE_URL=http://ollama:11434
# in their own manifests (the slug is the stable network alias on the shared
# anchor network). The domain is LAN-only convenience for debugging; nothing
# routes through Caddy in normal use.
#
# One-off on salem (already done 2026-07-03):
#   anchor app create ollama --domain ollama.salem.internal --rollout recreate
#   anchor deploy ollama --config anchor.salem.toml --context ~/apps/ollama
#   podman exec <anchor-ollama-*-app> ollama pull qwen2.5:3b-instruct   # ~1.9 GB
#   podman exec <anchor-ollama-*-app> ollama pull nomic-embed-text      # ~0.3 GB

[[apps]]
name = "ollama"
domains = ["ollama.salem.internal"]
# recreate on purpose: blue-green would run two Ollamas side by side and
# double peak RAM on the 16 GB box.
rollout = "recreate"

  [apps.build]
  dockerfile = "./deploy/Containerfile"
  context = "."

  [apps.health]
  # GET / answers 200 "Ollama is running".
  path = "/"
  port = 11434
  timeout-seconds = 30

  [apps.env]
  OLLAMA_HOST = "0.0.0.0:11434"
  # Hold a model in RAM for 10 minutes after the last request, then evict
  # (frees ~2 GB); one generation at a time and never two models resident -
  # this is a CPU box sharing 16 GB with ~20 containers.
  OLLAMA_KEEP_ALIVE = "10m"
  OLLAMA_NUM_PARALLEL = "1"
  OLLAMA_MAX_LOADED_MODELS = "1"

  [apps.resources]
  # 3B Q4 peaks around 3 GB resident; 6G leaves headroom for the embed model
  # swap. Raise to 8G before moving any consumer to a 7B model.
  memory = "6G"
  cpus = 4.0

  [apps.volumes]
  # Pulled models survive redeploys.
  models = "/root/.ollama"
